name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "pnpm-lock.yaml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter="./packages/*"

      - name: Run tests
        run: pnpm turbo test --filter="./packages/*"

      - name: Type check
        run: pnpm turbo type-check --filter="./packages/*"
